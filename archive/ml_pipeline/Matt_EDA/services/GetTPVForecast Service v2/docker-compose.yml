version: "3.9"

services:
  tpv_forecast:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tpv_forecast_service
    ports:
      - "8093:8093"
    volumes:
      - ./artifacts:/app/artifacts:ro
    environment:
      - ARTIFACTS_BASE_PATH=/app/artifacts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8093/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
