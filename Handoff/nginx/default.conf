server {
    listen 80;

    # Allow large payloads (raw transaction CSVs sent as JSON)
    client_max_body_size 200m;

    # Route all /api/ requests to the FastAPI backend
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Route all /ml/ requests to the ML microservice
    location /ml/ {
        proxy_pass         http://ml-service:8001/ml/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Redirect bare /sales to /sales/
    location = /sales {
        return 301 /sales/;
    }

    # Route /sales/ to the React (CRA) sales frontend
    location /sales/ {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Required for CRA hot-reload WebSocket
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # Redirect bare /merchant to /merchant/
    location = /merchant {
        return 301 /merchant/;
    }

    # Route /merchant/ to the merchant Vite frontend
    location /merchant/ {
        proxy_pass         http://merchant-frontend:3001/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Default: redirect root to /sales/
    location / {
        return 301 /sales/;
    }
}

