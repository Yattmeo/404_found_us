name: Frontend Dockerized Testing

on:
  workflow_dispatch: # Enables manual workflow execution

permissions:
  contents: read

jobs:
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
    - name: Check out the code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Run Frontend Unit Tests
      # Execute the unit test suite within the isolated frontend container.
      # Background services are purposely NOT started here to ensure fast execution.
      run: |
        docker compose run --rm frontend npm test -- --watchAll=false --testPathPattern=src/__tests__/unit

  integration-tests:
    name: Run Integration Tests
    needs: unit-tests 
    if: always() # CRITICAL ADDITION: This forces the job to run even if unit-tests fail
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
    - name: Check out the code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Start Background Services
      # Initialize dependent services required for integration testing.
      run: |
        docker compose up -d postgres ml-service backend
        sleep 10 # Delay execution to ensure dependent services are fully initialized.

    - name: Run Frontend Integration Tests
      # Execute the integration test suite.
      run: |
        docker compose run --rm frontend npm test -- --watchAll=false --testPathPattern=src/__tests__/integration

    - name: Tear down Docker environment
      if: always() # Ensure environment teardown executes regardless of previous step success or failure.
      run: |
        docker compose down -v