services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ml-postgres
    environment:
      - POSTGRES_USER=pguser
      - POSTGRES_PASSWORD=pgpassword
      - POSTGRES_DB=mldb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - ml-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ml-backend
    environment:
      - DATABASE_URL=postgresql://pguser:pgpassword@postgres:5432/mldb
      - COST_STRUCTURE_DIR=/app/cost_structure
      - ML_SERVICE_URL=http://ml-service:8001
    volumes:
      - ./backend:/app
      - ./cost_structure:/app/cost_structure:ro
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - ml-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ml-frontend
    environment:
      - REACT_APP_BACKEND_URL=http://localhost/api/v1
      - PUBLIC_URL=/sales
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ml-network

  merchant-frontend:
    build:
      context: ./merchant-frontend
      dockerfile: Dockerfile
    container_name: ml-merchant-frontend
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ml-network

  nginx:
    image: nginx:alpine
    container_name: ml-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
      - merchant-frontend
      - ml-service
      - m9-forecast-service
    restart: unless-stopped
    networks:
      - ml-network

  ml-service:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    container_name: ml-service
    environment:
      - DATABASE_URL=postgresql://pguser:pgpassword@postgres:5432/mldb
      - M9_FORECAST_SERVICE_URL=http://m9-forecast-service:8092
    volumes:
      - ./ml_service:/app
      - "./KNN Demo Service/KNN Demo Service:/data/knn_source:ro"
    depends_on:
      - postgres
      - m9-forecast-service
    restart: unless-stopped
    networks:
      - ml-network

  m9-forecast-service:
    build:
      context: "./ml_pipeline/Matt_EDA/services/GetAvgProcCostForecast Service v2"
      dockerfile: Dockerfile
    container_name: m9-forecast-service
    ports:
      - "8092:8092"
    volumes:
      - "./ml_pipeline/Matt_EDA/services/GetAvgProcCostForecast Service v2/artifacts:/app/artifacts:ro"
    environment:
      - ARTIFACTS_BASE_PATH=/app/artifacts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8092/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - ml-network

networks:
  ml-network:
    driver: bridge

volumes:
  postgres_data: