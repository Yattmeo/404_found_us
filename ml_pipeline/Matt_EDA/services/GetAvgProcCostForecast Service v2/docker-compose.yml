version: "3.9"

services:
  m9_forecast:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: m9_forecast_service
    ports:
      - "8092:8092"
    volumes:
      # Mount the host artifacts directory so train.py writes are visible
      # inside the container without rebuilding the image.
      - ./artifacts:/app/artifacts:ro
    environment:
      - ARTIFACTS_BASE_PATH=/app/artifacts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8092/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
