version: "3.9"

services:
  knn-quote-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: knn-quote-service
    ports:
      - "8000:8000"
    environment:
      # --- Option A: external / managed database (PostgreSQL, MySQL, MSSQL, etc.) ---
      # Uncomment and fill in your SQLAlchemy connection URL.
      # The target DB must expose 'transactions' and 'cost_type_ref' tables.
      # - DB_CONNECTION_STRING=postgresql://user:pass@host:5432/dbname

      # --- Option B: local SQLite file ---
      # Set to the full path of the .sqlite file inside the container.
      # Remove this line if using DB_CONNECTION_STRING instead.
      - TRANSACTIONS_AND_COST_TYPE_DB_PATH=/data/your_database.sqlite
    volumes:
      # Only needed for Option B (local SQLite).
      # Mount the directory that contains your SQLite file.
      - ./data:/data:ro
    restart: unless-stopped
